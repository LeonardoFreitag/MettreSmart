name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.31.0'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          REACT_APP_PROVIDER_AUTH_EMAIL: ${{ secrets.REACT_APP_PROVIDER_AUTH_EMAIL }}
          REACT_APP_PROVIDER_AUTH_PASSWORD: ${{ secrets.REACT_APP_PROVIDER_AUTH_PASSWORD }}
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

      - name: Deploy to Firebase Hosting
        run: pnpm exec firebase deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }}
